services:
  - type: web
    name: library-management-api
    runtime: java
    rootDir: library-management
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/library-management-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
